<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1080px; height:1920px;
  font-family:-apple-system,'SF Pro Display','Microsoft YaHei','Helvetica Neue',sans-serif;
  overflow:hidden; background:#fafaf7;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.top-bar { position:absolute; top:0; left:0; right:0; height:8px; background:linear-gradient(90deg,#667eea,#764ba2); }
.logo-wrap {
  width:260px; height:260px; border-radius:52px; background:#fff;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 32px rgba(0,0,0,.1); margin-bottom:48px;
  overflow:hidden; opacity:0; animation:popIn 0.7s ease 0.1s forwards;
}
.logo-wrap img { width:200px; height:200px; object-fit:contain; }
.brand {
  font-size:48px; font-weight:700; margin-bottom:14px;
  background:linear-gradient(90deg,#667eea,#764ba2);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  opacity:0; animation:slideUp 0.7s ease 0.3s forwards;
}
.account {
  font-size:40px; color:#888; font-weight:400; margin-bottom:56px;
  letter-spacing:2px;
  opacity:0; animation:slideUp 0.7s ease 0.45s forwards;
}
.desc {
  font-size:30px; color:#666; line-height:1.8; max-width:680px; text-align:center;
  opacity:0; animation:slideUp 0.7s ease 0.7s forwards;
}
@keyframes popIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
@keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="logo-wrap"><img src="mascot_logo.png" alt="logo"></div>
<div class="brand">每天认识一个AI工具</div>
<div class="account">一个句号的科技清单</div>
<div class="desc">帮你发现值得关注的开源项目与 AI 新玩法<br>每天 3 分钟，轻松跟上技术前沿</div>
</body>
</html>
